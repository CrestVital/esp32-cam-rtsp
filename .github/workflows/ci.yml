name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "docs/**", "chore/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: PlatformIO Build — ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - lilygo-t-display-s3
          - ai-thinker-esp32-cam
          - olimex-esp32-poe

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Check for compiler warnings
        run: |
          pio run -e ${{ matrix.env }} 2>&1 | tee build.log
          if grep -E "warning:" build.log; then
            echo "::warning::Compiler warnings detected — review build.log"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-${{ matrix.env }}-${{ github.sha }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
          retention-days: 7

  test:
    name: Host-side Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests
        run: make -f test/Makefile
