name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e lilygo-t-display-s3

      - name: Extract CHANGELOG entry
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          python3 -c "
          import sys, re
          version = sys.argv[1]
          try:
              with open('CHANGELOG.md') as f:
                  content = f.read()
              pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\n---|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              print(match.group(1).strip() if match else f'Release {version}')
          except Exception:
              print(f'Release {version}')
          " "$VERSION" > release_notes.md

      - name: Rename firmware artifact
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp .pio/build/lilygo-t-display-s3/firmware.bin esp32-cam-rtsp-${TAG}.bin
          cp .pio/build/lilygo-t-display-s3/firmware.elf esp32-cam-rtsp-${TAG}.elf

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "esp32-cam-rtsp ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            esp32-cam-rtsp-${{ github.ref_name }}.bin \
            esp32-cam-rtsp-${{ github.ref_name }}.elf
