name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build firmware — ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: lilygo-t-display-s3
            artifact_suffix: lilygo-t-display-s3
          - env: ai-thinker-esp32-cam
            artifact_suffix: ai-thinker-esp32-cam
          - env: olimex-esp32-poe
            artifact_suffix: olimex-esp32-poe

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Rename firmware artifact
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp .pio/build/${{ matrix.env }}/firmware.bin \
             esp32-cam-rtsp-${TAG}-${{ matrix.artifact_suffix }}.bin
          cp .pio/build/${{ matrix.env }}/firmware.elf \
             esp32-cam-rtsp-${TAG}-${{ matrix.artifact_suffix }}.elf

      - name: Upload firmware for release job
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.artifact_suffix }}
          path: |
            esp32-cam-rtsp-*-${{ matrix.artifact_suffix }}.bin
            esp32-cam-rtsp-*-${{ matrix.artifact_suffix }}.elf

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract CHANGELOG entry
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          python3 -c "
          import sys, re
          version = sys.argv[1]
          try:
              with open('CHANGELOG.md') as f:
                  content = f.read()
              pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\n---|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              print(match.group(1).strip() if match else f'Release {version}')
          except Exception:
              print(f'Release {version}')
          " "$VERSION" > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "esp32-cam-rtsp ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            artifacts/firmware-lilygo-t-display-s3/* \
            artifacts/firmware-ai-thinker-esp32-cam/* \
            artifacts/firmware-olimex-esp32-poe/*
