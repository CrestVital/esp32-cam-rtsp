[env:lilygo-t-display-s3]
platform = espressif32@7.0.0
board = lilygo-t-display-s3
framework = espidf

; Flash
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.flash_freq = 80m

; Partition table
board_build.partitions = partitions/partitions_ota.csv

; Upload
upload_speed = 460800

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

; ── Host-side unit tests (native x86/x64 GCC) ────────────────────────────
; Run with: pio test -e native
; Requires: native platform installed (pio pkg install -g -p native)
;
; Each suite in test/native/<suite>/ is compiled with its own set of
; component source files and mock stubs via the custom test runner.
; The throwtheswitch/Unity package is disabled — the project uses
; third-party/unity/ to avoid linker conflicts (multiple definition).
[env:native]
platform = native
test_framework = custom
; test_runner is auto-discovered by PlatformIO 6 at test/test_custom_runner.py
test_filter = native/*
build_flags =
    -std=c99
    -Wall
    -Wextra
    -Werror
    -Ithird-party/unity
    -Itest/mocks