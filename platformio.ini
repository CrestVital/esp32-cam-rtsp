[platformio]
default_envs = lilygo-t-camera-plus-ov2640

[env:lilygo-t-camera-plus-ov2640]
platform = espressif32@7.0.0
board = esp32dev
framework = espidf

board_build.flash_size = 4MB
board_build.flash_mode = qio
board_build.flash_freq = 40m
board_build.partitions = partitions/partitions_4mb_ota.csv
board_build.sdkconfig_defaults = sdkconfig.defaults sdkconfig.defaults.lilygo-t-camera-plus sdkconfig.sensor.ov2640
; Note: display and PSRAM selection are driven by sdkconfig fragment,
; not by build_flags. The -D workaround (ESPCAMFW-39) is no longer needed.

upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

